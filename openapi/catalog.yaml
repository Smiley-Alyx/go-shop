openapi: 3.0.3
info:
  title: catalog
  version: 0.0.0
servers:
  - url: http://localhost:8081
paths:
  /healthz:
    get:
      responses:
        '200':
          description: ok
          content:
            text/plain:
              schema:
                type: string
  /version:
    get:
      responses:
        '200':
          description: version
          content:
            text/plain:
              schema:
                type: string
  /products:
    get:
      responses:
        '200':
          description: list products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /products/{id}:
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: integer
      required:
        - id
        - name
        - price
    CreateProductRequest:
      type: object
      properties:
        name:
          type: string
        price:
          type: integer
      required:
        - name
        - price
    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
        details:
          type: object
      required:
        - error
        - code
