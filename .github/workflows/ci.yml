name: ci

on:
	push:
		branches: [ "main" ]
	pull_request:

jobs:
	test:
		runs-on: ubuntu-latest
		steps:
			- name: Checkout
				uses: actions/checkout@v4

			- name: Setup Go
				uses: actions/setup-go@v5
				with:
					go-version: "1.22.x"

			- name: Test catalog
				run: |
					cd services/catalog
					go test ./...

			- name: Test order
				run: |
					cd services/order
					go test ./...

			- name: Build catalog
				run: |
					cd services/catalog
					go build ./cmd/catalog

			- name: Build order
				run: |
					cd services/order
					go build ./cmd/order
